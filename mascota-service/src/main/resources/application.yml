spring:
  application:
    name: mascota-service
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
        session-token: ${AWS_SESSION_TOKEN} # <-- Esta es obligatoria en Academy

  # Configuración de base de datos
  datasource:
    url: jdbc:postgresql://db:5432/db_sanos_mascotas
    username: admin
    password: admin # Asegúrate de que esta sea la contraseña que definiste en tu docker-compose
    hikari:
      maximum-pool-size: 5 # <--- ESTO EVITARÁ EL ERROR DE "TOO MANY CLIENTS"
      connection-timeout: 30000

  # Configuración de Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

aws:
  sqs:
    queue-name: sanos-y-salvos-queue
